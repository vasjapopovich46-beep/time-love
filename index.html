<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ми разом вже</title>
    <style>
        /* Ніжний пастельний фон */
        body {
            margin: 0;
            padding: 0;
            background-color: #f4ece1; /* Теплий пастельний відтінок */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a3e3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        /* Контейнер для контенту */
        .container {
            max-width: 600px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.6); /* Напівпрозора біла плашка */
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            margin: 20px;
        }

        /* Стиль для фотографій, щоб вони НЕ розтягувалися */
        .photo-gallery {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .photo-gallery img {
            width: 250px;
            height: 250px;
            object-fit: cover; /* Фото обрізається по центру, зберігаючи пропорції */
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 5px solid white;
        }

        /* Заголовок */
        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #7c625c;
            font-weight: 600;
        }

        /* Таймер */
        #timer {
            font-size: 1.3rem;
            font-weight: bold;
            color: #5c4a45;
            background: #fff;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Галерея фотографій -->
        <div class="photo-gallery">
            <!-- Тут вкажи назви своїх файлів фотографій (наприклад, IMG_2026...jpg) -->
            <img src="IMG_20260128_084242_081.jpg" alt="Ми разом 1">
            <img src="IMG_20260128_084247_724.jpg" alt="Ми разом 2">
        </div>

        <h1>Ми разом вже:</h1>
        
        <!-- Таймер -->
        <div id="timer">Завантаження...</div>
    </div>

    <script>
        // Встанови тут вашу дату початку стосунків (Рік, Місяць-1, День, Години, Хвилини)
        // Увага: місяці рахуються з 0 (січень - 0, лютий - 1 і т.д.)
        const startDate = new Date(2023, 4, 15, 12, 0, 0); // Приклад: 15 травня 2023 року

        function updateTimer() {
            const now = new Date();
            const difference = now - startDate;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('timer').innerHTML = 
                `${days} днів, ${hours} годин, ${minutes} хвилин, ${seconds} секунд`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>

</body>
</html>
