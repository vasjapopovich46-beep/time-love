<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ми разом вже ❤️</title>
<style>
html,body{margin:0;height:100%;font-family:Arial,sans-serif;overflow:hidden}
#bg{position:fixed;inset:0;background:center/cover no-repeat;transition:opacity 1s}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.35)}
.panel{position:absolute;left:50%;bottom:40px;transform:translateX(-50%);
background:rgba(255,255,255,.18);backdrop-filter:blur(14px);border-radius:20px;
padding:24px;color:#fff;text-align:center;width:min(92%,700px)}
h1{margin:0 0 18px;font-size:2rem}
.row{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.box{background:rgba(255,255,255,.15);padding:12px 18px;border-radius:14px;min-width:90px}
.num{font-size:1.8rem;font-weight:bold}
</style>
</head>
<body>
<div id="bg"></div><div id="overlay"></div>
<div class="panel">
<h1>❤️ Ми разом вже:</h1>
<div class="row">
<div class="box"><div id="d" class="num">0</div>днів</div>
<div class="box"><div id="h" class="num">0</div>годин</div>
<div class="box"><div id="m" class="num">0</div>хвилин</div>
<div class="box"><div id="s" class="num">0</div>секунд</div>
</div></div>
<script>
const photos=[
"IMG_20260128_084242_031.jpg","IMG_20260128_084245_247.jpg","IMG_20260128_084847_734.jpg",
"IMG_20260128_090030_703.jpg","IMG_20260128_090226_373.JPG","IMG_20260128_090627_041.jpg",
"IMG_20260310_113333_379.jpg","IMG_20250420_090924_955.JPG","IMG_20250420_090942_442.JPG",
"5789907354765084160_121.jpg","5789907354765084165_121.jpg"];
let i=0,bg=document.getElementById("bg");
function show(){bg.style.opacity=0;setTimeout(()=>{bg.style.backgroundImage="url('"+photos[i]+"')";bg.style.opacity=1;i=(i+1)%photos.length;},300)}
show();setInterval(show,5000);
const start=new Date(2023,6,22,20,0,0);
function tick(){
let x=Date.now()-start.getTime();
let days=Math.floor(x/86400000);x%=86400000;
let hrs=Math.floor(x/3600000);x%=3600000;
let mins=Math.floor(x/60000);x%=60000;
let secs=Math.floor(x/1000);
d.textContent=days;h.textContent=hrs;m.textContent=mins;s.textContent=secs;
}
tick();setInterval(tick,1000);
</script>
</body></html>
